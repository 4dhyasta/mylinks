<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>@adhyasta</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.12);
      --text: #f5f5f5;
      --sub: rgba(245,245,245,0.5);
      --accent1: #ffffff;
      --accent2: #cccccc;
      --accent3: #888888;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Japanese animated canvas bg */
    #bgCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Avatar */
    .avatar-wrap {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
      margin-bottom: 1.1rem;
      animation: fadeDown 0.6s ease both;
    }
    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #1a1828;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.7rem;
      letter-spacing: -0.02em;
      animation: fadeDown 0.6s 0.1s ease both;
    }

    .bio {
      color: var(--sub);
      font-size: 0.9rem;
      margin-top: 0.35rem;
      margin-bottom: 2rem;
      text-align: center;
      animation: fadeDown 0.6s 0.2s ease both;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.95rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      animation: fadeUp 0.5s ease both;
    }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--hover-glow, transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: inherit;
    }

    .link-card:hover { transform: translateY(-2px) scale(1.01); border-color: rgba(255,255,255,0.18); }
    .link-card:hover::before { opacity: 1; }
    .link-card:active { transform: scale(0.98); }

    .link-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      flex-shrink: 0;
      background: var(--icon-bg, rgba(255,255,255,0.08));
    }

    .link-info { flex: 1; }
    .link-platform { font-size: 0.72rem; color: var(--sub); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
    .link-label { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; margin-top: 0.1rem; }

    .link-arrow {
      color: var(--sub);
      font-size: 1rem;
      transition: transform 0.2s ease;
    }
    .link-card:hover .link-arrow { transform: translateX(3px); }

    /* Individual platform colors */
    .card-wa   { --icon-bg: rgba(255,255,255,0.08); --hover-glow: radial-gradient(ellipse at left, rgba(255,255,255,0.06) 0%, transparent 70%); }
    .card-dc   { --icon-bg: rgba(255,255,255,0.08); --hover-glow: radial-gradient(ellipse at left, rgba(255,255,255,0.06) 0%, transparent 70%); }
    .card-yt   { --icon-bg: rgba(255,255,255,0.08); --hover-glow: radial-gradient(ellipse at left, rgba(255,255,255,0.06) 0%, transparent 70%); }
    .card-tt   { --icon-bg: rgba(255,255,255,0.08); --hover-glow: radial-gradient(ellipse at left, rgba(255,255,255,0.06) 0%, transparent 70%); }
    .card-rb   { --icon-bg: rgba(255,255,255,0.08); --hover-glow: radial-gradient(ellipse at left, rgba(255,255,255,0.06) 0%, transparent 70%); }
    .card-ig   { --icon-bg: rgba(255,255,255,0.08); --hover-glow: radial-gradient(ellipse at left, rgba(255,255,255,0.06) 0%, transparent 70%); }
    .card-tw   { --icon-bg: rgba(255,255,255,0.08); --hover-glow: radial-gradient(ellipse at left, rgba(255,255,255,0.06) 0%, transparent 70%); }
    .card-gh   { --icon-bg: rgba(255,255,255,0.1);  --hover-glow: radial-gradient(ellipse at left, rgba(255,255,255,0.06) 0%, transparent 70%); }

    /* Stagger animations */
    .link-card:nth-child(1) { animation-delay: 0.25s; }
    .link-card:nth-child(2) { animation-delay: 0.32s; }
    .link-card:nth-child(3) { animation-delay: 0.39s; }
    .link-card:nth-child(4) { animation-delay: 0.46s; }
    .link-card:nth-child(5) { animation-delay: 0.53s; }
    .link-card:nth-child(6) { animation-delay: 0.60s; }
    .link-card:nth-child(7) { animation-delay: 0.67s; }
    .link-card:nth-child(8) { animation-delay: 0.74s; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .footer {
      margin-top: 2.5rem;
      color: rgba(255,255,255,0.2);
      font-size: 0.75rem;
      animation: fadeUp 0.5s 0.9s ease both;
    }

    /* SVG Icons */
    .svg-icon { width: 22px; height: 22px; }
  </style>

  <script>
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const elements = [];

    class SeigaihaWave {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.r = 20 + Math.random() * 40;
        this.opacity = 0;
        this.maxOpacity = 0.04 + Math.random() * 0.06;
        this.speed = 0.003 + Math.random() * 0.004;
        this.phase = Math.random() * Math.PI * 2;
        this.drift = (Math.random() - 0.5) * 0.3;
      }
      update(t) {
        this.opacity = this.maxOpacity * (0.5 + 0.5 * Math.sin(t * this.speed * 1000 + this.phase));
        this.x += this.drift * 0.1;
        if (this.x < -100 || this.x > canvas.width + 100) this.reset();
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 0.8;
        for (let i = 3; i >= 1; i--) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r * (i / 3), Math.PI, 0);
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    class InkLine {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = -50;
        this.length = 60 + Math.random() * 120;
        this.speed = 0.3 + Math.random() * 0.5;
        this.opacity = 0.03 + Math.random() * 0.05;
        this.width = 0.5 + Math.random() * 1.5;
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = 0.02 + Math.random() * 0.03;
        this.wobbleAmp = 5 + Math.random() * 15;
      }
      update() {
        this.y += this.speed;
        this.wobble += this.wobbleSpeed;
        if (this.y > canvas.height + 100) this.reset();
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = this.width;
        ctx.beginPath();
        ctx.moveTo(this.x + Math.sin(this.wobble) * this.wobbleAmp, this.y - this.length / 2);
        ctx.bezierCurveTo(
          this.x + Math.sin(this.wobble + 1) * this.wobbleAmp, this.y - this.length / 4,
          this.x + Math.sin(this.wobble + 2) * this.wobbleAmp, this.y + this.length / 4,
          this.x + Math.sin(this.wobble + 3) * this.wobbleAmp, this.y + this.length / 2
        );
        ctx.stroke();
        ctx.restore();
      }
    }

    class GeomShape {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = 15 + Math.random() * 30;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.005;
        this.opacity = 0;
        this.maxOpacity = 0.03 + Math.random() * 0.04;
        this.phase = Math.random() * Math.PI * 2;
        this.pulseSpeed = 0.002 + Math.random() * 0.003;
        this.type = Math.floor(Math.random() * 3);
      }
      update(t) {
        this.rotation += this.rotSpeed;
        this.opacity = this.maxOpacity * (0.5 + 0.5 * Math.sin(t * this.pulseSpeed * 1000 + this.phase));
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.globalAlpha = this.opacity;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 0.8;
        if (this.type === 0) {
          ctx.beginPath();
          ctx.moveTo(0, -this.size);
          ctx.lineTo(this.size * 0.6, 0);
          ctx.lineTo(0, this.size);
          ctx.lineTo(-this.size * 0.6, 0);
          ctx.closePath();
          ctx.stroke();
        } else if (this.type === 1) {
          ctx.beginPath();
          ctx.arc(0, 0, this.size, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-this.size, 0); ctx.lineTo(this.size, 0);
          ctx.moveTo(0, -this.size); ctx.lineTo(0, this.size);
          ctx.stroke();
        } else {
          for (let i = 1; i <= 3; i++) {
            const s = this.size * (i / 3);
            ctx.strokeRect(-s, -s, s * 2, s * 2);
          }
        }
        ctx.restore();
      }
    }

    class WaveBand {
      constructor(y) {
        this.y = y;
        this.phase = Math.random() * Math.PI * 2;
        this.speed = 0.0008 + Math.random() * 0.0005;
        this.amplitude = 8 + Math.random() * 12;
        this.freq = 0.008 + Math.random() * 0.004;
        this.opacity = 0.025 + Math.random() * 0.03;
      }
      draw(t) {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        for (let x = 0; x <= canvas.width; x += 3) {
          const y = this.y + Math.sin(x * this.freq + t * this.speed * 1000 + this.phase) * this.amplitude;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.restore();
      }
    }

    for (let i = 0; i < 25; i++) elements.push(new SeigaihaWave());
    for (let i = 0; i < 20; i++) elements.push(new InkLine());
    for (let i = 0; i < 15; i++) elements.push(new GeomShape());
    const waveBands = Array.from({length: 12}, (_, i) => new WaveBand((i + 1) * canvas.height / 13));

    function animate(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.globalAlpha = 0.015;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 0.5;
      for (let x = 0; x < canvas.width; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }
      ctx.restore();

      waveBands.forEach(w => w.draw(t));
      elements.forEach(el => { el.update(t); el.draw(); });

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
