<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>@adhyasta</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #f0eeff;
      --sub: rgba(240,238,255,0.5);
      --accent1: #7c5cfc;
      --accent2: #fc5c8a;
      --accent3: #5cf0fc;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Animated bg blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: floatBlob 12s ease-in-out infinite alternate;
    }
    .bg-blob:nth-child(1) { width: 420px; height: 420px; background: var(--accent1); top: -100px; left: -80px; animation-delay: 0s; }
    .bg-blob:nth-child(2) { width: 300px; height: 300px; background: var(--accent2); bottom: -50px; right: -60px; animation-delay: -4s; }
    .bg-blob:nth-child(3) { width: 200px; height: 200px; background: var(--accent3); top: 40%; left: 60%; animation-delay: -8s; }

    @keyframes floatBlob {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.1); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Avatar */
    .avatar-wrap {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
      margin-bottom: 1.1rem;
      animation: fadeDown 0.6s ease both;
    }
    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #1a1828;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.7rem;
      letter-spacing: -0.02em;
      animation: fadeDown 0.6s 0.1s ease both;
    }

    .bio {
      color: var(--sub);
      font-size: 0.9rem;
      margin-top: 0.35rem;
      margin-bottom: 2rem;
      text-align: center;
      animation: fadeDown 0.6s 0.2s ease both;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.95rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      animation: fadeUp 0.5s ease both;
    }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--hover-glow, transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: inherit;
    }

    .link-card:hover { transform: translateY(-2px) scale(1.01); border-color: rgba(255,255,255,0.18); }
    .link-card:hover::before { opacity: 1; }
    .link-card:active { transform: scale(0.98); }

    .link-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      flex-shrink: 0;
      background: var(--icon-bg, rgba(255,255,255,0.08));
    }

    .link-info { flex: 1; }
    .link-platform { font-size: 0.72rem; color: var(--sub); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
    .link-label { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; margin-top: 0.1rem; }

    .link-arrow {
      color: var(--sub);
      font-size: 1rem;
      transition: transform 0.2s ease;
    }
    .link-card:hover .link-arrow { transform: translateX(3px); }

    /* Individual platform colors */
    .card-wa   { --icon-bg: rgba(37,211,102,0.15); --hover-glow: radial-gradient(ellipse at left, rgba(37,211,102,0.07) 0%, transparent 70%); }
    .card-dc   { --icon-bg: rgba(88,101,242,0.2);  --hover-glow: radial-gradient(ellipse at left, rgba(88,101,242,0.1) 0%, transparent 70%); }
    .card-yt   { --icon-bg: rgba(255,0,0,0.15);    --hover-glow: radial-gradient(ellipse at left, rgba(255,0,0,0.08) 0%, transparent 70%); }
    .card-tt   { --icon-bg: rgba(255,0,80,0.12);   --hover-glow: radial-gradient(ellipse at left, rgba(255,0,80,0.08) 0%, transparent 70%); }
    .card-rb   { --icon-bg: rgba(0,102,255,0.15); --hover-glow: radial-gradient(ellipse at left, rgba(0,102,255,0.08) 0%, transparent 70%); }
    .card-ig   { --icon-bg: rgba(225,48,108,0.15); --hover-glow: radial-gradient(ellipse at left, rgba(225,48,108,0.08) 0%, transparent 70%); }
    .card-tw   { --icon-bg: rgba(29,161,242,0.15); --hover-glow: radial-gradient(ellipse at left, rgba(29,161,242,0.08) 0%, transparent 70%); }
    
    .card-sw   { --icon-bg: rgba(255,107,53,0.15); --hover-glow: radial-gradient(ellipse at left, rgba(255,107,53,0.08) 0%, transparent 70%); }
    .card-gh   { --icon-bg: rgba(255,255,255,0.1);  --hover-glow: radial-gradient(ellipse at left, rgba(255,255,255,0.06) 0%, transparent 70%); }

    /* Stagger animations */
    .link-card:nth-child(1) { animation-delay: 0.25s; }
    .link-card:nth-child(2) { animation-delay: 0.32s; }
    .link-card:nth-child(3) { animation-delay: 0.39s; }
    .link-card:nth-child(4) { animation-delay: 0.46s; }
    .link-card:nth-child(5) { animation-delay: 0.53s; }
    .link-card:nth-child(6) { animation-delay: 0.60s; }
    .link-card:nth-child(7) { animation-delay: 0.67s; }
    .link-card:nth-child(8) { animation-delay: 0.74s; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .footer {
      margin-top: 2.5rem;
      color: rgba(255,255,255,0.2);
      font-size: 0.75rem;
      animation: fadeUp 0.5s 0.9s ease both;
    }

    /* SVG Icons */
    .svg-icon { width: 22px; height: 22px; }
  </style>
